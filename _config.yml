# --- Site ---

title: Sunghyeon Jo
description: Academic website of Sunghyeon Jo
author: Sunghyeon Jo
language: en

# Navigation shown in the site header (top bar).
# Key = label, value = relative path or absolute URL.
navbar-links:
  Blog: "/blog"
  CV: "/cv"
  GitHub: "https://github.com/ainta"

# --- Build ---

timezone: "America/Vancouver"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 8
paginate_path: "/blog/:num/"

kramdown:
  input: GFM
  math_engine: null

date_format: "%B %-d, %Y"

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - docs/
  - vendor/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
