<header class="site-header">
  <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title | default: site.author }}</a>
  <nav>
    {%- for link in site.navbar-links -%}
      <a href="{% if link[1] contains '://' %}{{ link[1] }}{% else %}{{ link[1] | relative_url }}{% endif %}">{{ link[0] }}</a>
    {%- endfor -%}
  </nav>
</header>
